steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tiktok-viral-analyzer', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tiktok-viral-analyzer']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tiktok-viral-analyzer'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tiktok-viral-analyzer'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},VITE_STRIPE_PUBLIC_KEY=${_VITE_STRIPE_PUBLIC_KEY}'
images:
  - 'gcr.io/$PROJECT_ID/tiktok-viral-analyzer'
